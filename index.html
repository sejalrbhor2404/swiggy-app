<!DOCTYPE html>
<html>

<head>
<title>Swiggy Menu</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

h1{
color:#fc8019;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
margin:15px;
width:220px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

img{
width:150px;
height:120px;
}

button{
background:#fc8019;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Swiggy Menu</h1>

<input type="text" id="search" placeholder="Search food..." onkeyup="searchFood()">

<div class="container" id="foodList"></div>

<script>

let allFood=[]

fetch('/food')
.then(res => res.json())
.then(data => {

allFood=data
displayFood(data)

})

function displayFood(data){

let foodList=document.getElementById("foodList")

foodList.innerHTML=""

data.forEach(food=>{

let image=""

if(food.name=="Burger") image="https://cdn-icons-png.flaticon.com/512/3075/3075977.png"
else if(food.name=="Pizza") image="https://cdn-icons-png.flaticon.com/512/6978/6978255.png"
else if(food.name=="Biryani") image="https://cdn-icons-png.flaticon.com/512/2718/2718224.png"
else if(food.name=="Pasta") image="https://cdn-icons-png.flaticon.com/512/3480/3480823.png"
else if(food.name=="Sandwich") image="https://cdn-icons-png.flaticon.com/512/1046/1046784.png"
else if(food.name=="Fries") image="https://cdn-icons-png.flaticon.com/512/2553/2553691.png"

let card = `
<div class="card">
<img src="${image}">
<h3>${food.name}</h3>
<p>₹${food.price}</p>
<button onclick="addToCart('${food.name}',${food.price})">
Add to Cart
</button>
</div>
`

foodList.innerHTML += card

})

}

let cart=[]

function addToCart(name,price){

cart.push({name,price})
alert(name+" added to cart")

}

function searchFood(){

let text=document.getElementById("search").value.toLowerCase()

let filtered=allFood.filter(f =>
f.name.toLowerCase().includes(text)
)

displayFood(filtered)

}

</script>

</body>
</html>
